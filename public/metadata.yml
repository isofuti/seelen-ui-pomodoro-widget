id: "@pomodoro/widget"

metadata:
  displayName: Pomodoro Tracker
  description: A beautiful Pomodoro productivity tracker with statistics and notification sound.
  tags:
    - pomodoro
    - timer
    - productivity

icon: PiTomatoFill

preset: Popup
instances: Single
lazy: false

html: !include index.html
js: !include index.js
css: !include index.css

plugins:
  - !extend ./toolbar-plugin.yml

settings:
  - type: number
    key: work-duration
    label: Work Duration (minutes)
    defaultValue: 25
    min: 1
    max: 60
    step: 1
  - type: number
    key: break-duration
    label: Break Duration (minutes)
    defaultValue: 5
    min: 1
    max: 60
    step: 1
  - type: number
    key: target-pomodoros
    label: Daily Target Pomodoros
    defaultValue: 8
    min: 1
    max: 10
    step: 1
