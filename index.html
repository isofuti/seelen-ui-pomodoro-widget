<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Tracker</title>
  </head>
  <body>
    <div id="app" class="pomodoro-app">
      <!-- Header -->
      <div class="pomodoro-header">
        <span class="pomodoro-title">
          <span class="tomato-icon">🍅</span> Pomodoro
        </span>
        <span class="pomodoro-state-badge" id="state-badge">Focus</span>
      </div>

      <!-- Main Circular Timer Section -->
      <div class="timer-container">
        <svg class="progress-ring" width="160" height="160">
          <circle
            class="progress-ring__circle-bg"
            stroke="rgba(255, 255, 255, 0.08)"
            stroke-width="8"
            fill="transparent"
            r="70"
            cx="80"
            cy="80"
          />
          <circle
            class="progress-ring__circle"
            id="progress-circle"
            stroke="#ff5e57"
            stroke-width="8"
            fill="transparent"
            r="70"
            cx="80"
            cy="80"
          />
        </svg>
        <div class="timer-display">
          <div class="time-left" id="time-display">25:00</div>
          <div class="timer-status" id="status-display">Ready</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-container">
        <button class="control-btn play-btn" id="play-pause-btn" title="Start">
          <span class="btn-icon">▶</span> Start
        </button>
        <button class="control-btn reset-btn" id="reset-btn" title="Reset">
          <span class="btn-icon">↺</span> Reset
        </button>
        <button class="control-btn skip-btn" id="skip-btn" title="Skip">
          <span class="btn-icon">⏭</span> Skip
        </button>
      </div>

      <!-- Target/Statistics Section -->
      <div class="stats-container">
        <div class="stats-header">
          <span class="stats-label">Daily Target</span>
          <div class="target-controls">
            <button class="target-btn" id="target-minus" title="Decrease target">-</button>
            <span class="target-value" id="target-count">8</span>
            <button class="target-btn" id="target-plus" title="Increase target">+</button>
          </div>
        </div>

        <!-- Pomodoro dot indicators -->
        <div class="dots-grid" id="dots-grid">
          <!-- Dots will be dynamically generated by JS -->
        </div>

        <div class="stats-summary" id="stats-summary">
          Completed: 0 / 8 pomodoros
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
